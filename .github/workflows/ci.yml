name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (a new push aborts the previous CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Lexical retrieval in CI: the neural model (Transformers.js/MiniLM) is a ~50MB download and HF 403s
  # anonymous downloads from CI runners — the app supports lexical as a first-class mode (same
  # validation + compliance gate), so CI stays offline + fast without it.
  NEXUSREP_EMBEDDINGS: lexical

jobs:
  checks:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0" # matches render.yaml
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test # vitest (runs auth-off via vitest.config)
      - run: npm run build # next build = typecheck + lint + bundle

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e # playwright.config builds+starts the app with mocks (NEXUSREP_AUTH=0)
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
