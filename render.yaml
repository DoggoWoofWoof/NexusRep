# Render Blueprint — deploy NexusRep as a single Node web service.
# https://render.com/docs/blueprint-spec
#
# One-time setup after "New → Blueprint" points at this repo:
#   1. Fill the sync:false env vars in the Render dashboard (they are secrets —
#      never committed). Leave blank what you don't use: every vendor is mocked
#      by default and the app still runs.
#   2. NEXUSREP_PUBLIC_URL must be the service's own public URL — Tavus calls
#      back into /api/tavus/llm through it for the compliance-gated replies.
#   3. Storage: the free tier's disk is EPHEMERAL — a deploy/restart wipes
#      .nexusrep-data. Attach a paid persistent disk (below, commented) and set
#      PGLITE_DATA_DIR to the mount path to keep sessions/uploads durable, or
#      run NEXUSREP_DATA_DRIVER=memory and treat every boot as a fresh demo.

services:
  - type: web
    name: nexusrep
    runtime: node
    plan: starter # bump if the embedded model (Transformers.js) needs more memory
    # MUST stay a single instance: the app keeps per-process state (embedded PGlite store,
    # the active Tavus call slot, per-session write serialization). Scaling out would split
    # sessions across processes. Multi-instance needs a managed Postgres + shared call registry.
    numInstances: 1
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/brand
    # NOTE: embedded Postgres (PGlite) needs ~600MB — it does NOT fit the Starter 512MB
    # instance (measured). So Starter uses the in-memory driver below (no disk needed).
    # For durable state, either (a) bump to a >=2GB instance and switch the driver to
    # "postgres" + attach this disk, or (b) point DATABASE_URL at a hosted Postgres.
    # disk:
    #   name: nexusrep-data
    #   mountPath: /var/data
    #   sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      # In-memory store — fits the 512MB Starter instance (PGlite needs ~600MB). State
      # re-seeds on every restart. On a >=2GB instance, set this to "postgres", add
      # PGLITE_DATA_DIR=/var/data/nexusrep, and uncomment the disk above for persistence.
      - key: NEXUSREP_DATA_DRIVER
        value: memory
      # Starter instances have 512MB — the neural embeddings model (Transformers.js)
      # OOMs at boot when the retrieval index builds. Lexical retrieval runs through the
      # exact same validation + compliance gate; flip to "auto" on a >=2GB instance.
      - key: NEXUSREP_EMBEDDINGS
        value: lexical
      # Flip to "tavus" once TAVUS_* secrets are set to enable the live video rep.
      - key: NEXUSREP_REALTIME_PROVIDER
        value: mock
      # ---- secrets: set values in the Render dashboard (sync: false) ----
      - key: ANTHROPIC_API_KEY # grounded answer composition + classifier (optional)
        sync: false
      - key: OPENAI_API_KEY # alternate composer/classifier (optional)
        sync: false
      - key: TAVUS_API_KEY # video rep (optional — mock avatar without it)
        sync: false
      - key: TAVUS_LLM_KEY # bearer Tavus uses to call back into /api/tavus/llm
        sync: false
      - key: HF_TOKEN # read-only Hugging Face token — only needed if you flip NEXUSREP_EMBEDDINGS
        sync: false # to "auto" on a >=2GB instance (HF 403s anonymous downloads from Render)
      - key: NEXUSREP_PUBLIC_URL # https://<this-service>.onrender.com
        sync: false
      - key: DOCNEXUS_ADVANCED_SEARCH_URL # live HCP cohort (optional — modeled without it)
        sync: false
      - key: DOCNEXUS_ID_TOKEN # short-lived; prefer the refresh trio below
        sync: false
      # Browserless live-cohort auth (~30 days per login): run
      # `node scripts/docnexus-platform-token.mjs` locally once and copy
      # refreshToken/clientId/region from .docnexus-id-token.json.
      - key: DOCNEXUS_REFRESH_TOKEN
        sync: false
      - key: DOCNEXUS_COGNITO_CLIENT_ID
        sync: false
      - key: DOCNEXUS_COGNITO_REGION
        sync: false
