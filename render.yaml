# Render Blueprint — deploy NexusRep as a single Node web service.
# https://render.com/docs/blueprint-spec
#
# One-time setup after "New → Blueprint" points at this repo:
#   1. Fill the sync:false env vars in the Render dashboard (they are secrets —
#      never committed). Leave blank what you don't use: every vendor is mocked
#      by default and the app still runs.
#   2. NEXUSREP_PUBLIC_URL must be the service's own public URL — Tavus calls
#      back into /api/tavus/llm through it for the compliance-gated replies.
#   3. Storage: the free tier's disk is EPHEMERAL — a deploy/restart wipes
#      .nexusrep-data. Attach a paid persistent disk (below, commented) and set
#      PGLITE_DATA_DIR to the mount path to keep sessions/uploads durable, or
#      run NEXUSREP_DATA_DRIVER=memory and treat every boot as a fresh demo.

services:
  - type: web
    name: nexusrep
    runtime: node
    plan: starter # bump if the embedded model (Transformers.js) needs more memory
    # MUST stay a single instance: the app keeps per-process state (embedded PGlite store,
    # the active Tavus call slot, per-session write serialization). Scaling out would split
    # sessions across processes. Multi-instance needs a managed Postgres + shared call registry.
    numInstances: 1
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/brand
    # PERSISTENCE (pick one; without one, state re-seeds on every restart):
    #  (A) RECOMMENDED — managed Postgres: set the DATABASE_URL secret below to a hosted Postgres
    #      (Render Postgres / Neon / Supabase). Works on the 512MB Starter (no 600MB PGlite WASM),
    #      survives restarts, and is the only option that survives scaling past one instance. Schema
    #      is auto-created (CREATE TABLE IF NOT EXISTS) on first use.
    #  (B) embedded PGlite on a disk: PGlite needs ~600MB so it does NOT fit Starter (measured) —
    #      bump to a >=2GB instance, set NEXUSREP_DATA_DRIVER=postgres + PGLITE_DATA_DIR=/var/data/nexusrep,
    #      and uncomment the disk below (single-instance only).
    # disk:
    #   name: nexusrep-data
    #   mountPath: /var/data
    #   sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      # In-memory store — fits the 512MB Starter instance (PGlite needs ~600MB). State
      # re-seeds on every restart. On a >=2GB instance, set this to "postgres", add
      # PGLITE_DATA_DIR=/var/data/nexusrep, and uncomment the disk above for persistence.
      - key: NEXUSREP_DATA_DRIVER
        value: memory
      # "auto" = neural semantic embeddings (Transformers.js / MiniLM), falling back to lexical only
      # if the model can't load. Needs a >=2GB instance (the model OOMs a 512MB Starter at boot) AND
      # an HF_TOKEN secret (HF 403s anonymous downloads from Render). On a 512MB Starter set this to
      # "lexical" instead — same validation + compliance gate, just keyword ranking.
      - key: NEXUSREP_EMBEDDINGS
        value: auto
      # Flip to "tavus" once TAVUS_* secrets are set to enable the live video rep.
      - key: NEXUSREP_REALTIME_PROVIDER
        value: mock
      # Auth gate: ON by default (brand console requires sign-in; the doctor /hcp link is never gated).
      # Set to "0" ONLY to run the console open (pure demo). When ON, NEXUSREP_SESSION_SECRET is
      # REQUIRED — the brand API returns 503 until it's set (the built-in default is public/forgeable).
      - key: NEXUSREP_AUTH
        value: "1"
      # Rate limiting: OFF for now. The doctor endpoints are IP-keyed and HCPs share IPs (hospital NAT),
      # so enabling as-is could 429 a legitimate doctor. Flip to "1" once they're keyed by session.
      - key: NEXUSREP_RATELIMIT
        value: "0"
      # ---- secrets: set values in the Render dashboard (sync: false) ----
      - key: NEXUSREP_SESSION_SECRET # REQUIRED when NEXUSREP_AUTH=1: a long random string. Signs the
        sync: false #                  session cookie; without it cookies are forgeable and the brand API 503s.
      - key: DATABASE_URL # managed Postgres (persistence path A above). When set, ALL canonical state
        sync: false #        persists here instead of the in-memory/PGlite driver. SSL is auto-enabled
        #                    for non-localhost hosts. Leave blank to keep the NEXUSREP_DATA_DRIVER above.
      - key: ANTHROPIC_API_KEY # grounded answer composition + classifier (optional)
        sync: false
      - key: OPENAI_API_KEY # alternate composer/classifier (optional)
        sync: false
      # Real CRM handoff: set NEXUSREP_CRM_ADAPTER=veeva|salesforce (in the value block above) AND this
      # intake URL to POST follow-up events to a real CRM; a scheduled worker retries failures.
      - key: NEXUSREP_CRM_WEBHOOK_URL
        sync: false
      - key: NEXUSREP_CRM_WEBHOOK_TOKEN # optional bearer for the CRM intake endpoint
        sync: false
      - key: TAVUS_API_KEY # video rep (optional — mock avatar without it)
        sync: false
      - key: TAVUS_LLM_KEY # bearer Tavus uses to call back into /api/tavus/llm
        sync: false
      - key: HF_TOKEN # read-only Hugging Face token — only needed if you flip NEXUSREP_EMBEDDINGS
        sync: false # to "auto" on a >=2GB instance (HF 403s anonymous downloads from Render)
      - key: NEXUSREP_PUBLIC_URL # https://<this-service>.onrender.com
        sync: false
      - key: DOCNEXUS_ADVANCED_SEARCH_URL # live HCP cohort (optional — modeled without it)
        sync: false
      - key: DOCNEXUS_ID_TOKEN # short-lived; prefer the refresh trio below
        sync: false
      # Browserless live-cohort auth (~30 days per login): run
      # `node scripts/docnexus-platform-token.mjs` locally once and copy
      # refreshToken/clientId/region from .docnexus-id-token.json.
      - key: DOCNEXUS_REFRESH_TOKEN
        sync: false
      - key: DOCNEXUS_COGNITO_CLIENT_ID
        sync: false
      - key: DOCNEXUS_COGNITO_REGION
        sync: false
