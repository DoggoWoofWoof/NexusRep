# Render Blueprint — deploy NexusRep as a single Node web service.
# https://render.com/docs/blueprint-spec
#
# One-time setup after "New → Blueprint" points at this repo:
#   1. Fill the sync:false env vars in the Render dashboard (they are secrets —
#      never committed). Leave blank what you don't use: every vendor is mocked
#      by default and the app still runs.
#   2. NEXUSREP_PUBLIC_URL must be the service's own public URL — Tavus calls
#      back into /api/tavus/llm through it for the compliance-gated replies.
#   3. Persistence: set the DATABASE_URL secret to a managed Postgres (Neon / Supabase / Render PG).
#      All canonical state (sessions, follow-ups, content, audit) AND the usage + activity ledgers then
#      survive restarts. Without it, the app runs on in-memory data that re-seeds on every boot.

services:
  - type: web
    name: nexusrep
    runtime: node
    # 2 GB (standard) gives headroom for the neural embedding model's boot-time load (MiniLM via
    # Transformers.js). Now that DATABASE_URL/Neon has replaced the ~600 MB embedded PGlite, steady-state
    # is only ~256 MB — so "starter" (512 MB) is worth a try and halves the cost. To test it: switch the
    # plan in the dashboard, redeploy, and watch /api/health + the memory graph for ~2 min; if the model
    # OOM-crash-loops at boot (health never 200), revert to standard. Keep neural (embeddings=auto) either way.
    plan: standard
    # MUST stay a single instance: the app keeps per-process state — the active Tavus call slot,
    # per-session write serialization, and the in-memory usage/activity ledgers (snapshotted to Postgres,
    # but served from memory). Canonical data is already in Postgres; scaling out still needs a shared
    # call registry + a shared rate-limit store first.
    numInstances: 1
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    # /api/health reports "up + DB connected" and does NOT depend on auth (unlike /api/brand, which can
    # 503 until the session secret is set), so it's a truer liveness signal.
    healthCheckPath: /api/health
    # PERSISTENCE: this deploy uses managed Postgres — the DATABASE_URL secret below points at Neon, so
    # all canonical state + the usage/activity ledgers survive restarts, the schema auto-creates
    # (CREATE TABLE IF NOT EXISTS), and there is no on-disk WASM footprint. Embedded PGlite on a
    # persistent disk is only the fallback if you ever unset DATABASE_URL: it needs ~600 MB (a >=2 GB
    # instance) + NEXUSREP_DATA_DRIVER=postgres + PGLITE_DATA_DIR=/var/data/nexusrep + the disk below.
    # With Neon set, none of that applies.
    # disk:
    #   name: nexusrep-data
    #   mountPath: /var/data
    #   sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      # IGNORED while DATABASE_URL is set — managed Postgres (Neon) takes precedence over this driver.
      # It only applies as the fallback if DATABASE_URL is ever blanked: "memory" (re-seeds each boot) or
      # "postgres" (embedded PGlite, which needs the disk above + a >=2 GB instance).
      - key: NEXUSREP_DATA_DRIVER
        value: memory
      # "auto" = neural semantic embeddings (Transformers.js / MiniLM) — keep this. Needs an HF_TOKEN
      # secret (HF 403s anonymous datacenter downloads) and enough RAM for the boot-time model load. With
      # PGlite gone (Neon), steady-state is small (~256 MB), so it fits comfortably on 2 GB and is worth
      # testing on 512 MB. It auto-falls back to lexical ONLY if the model genuinely can't load.
      - key: NEXUSREP_EMBEDDINGS
        value: auto
      # Flip to "tavus" once TAVUS_* secrets are set to enable the live video rep.
      - key: NEXUSREP_REALTIME_PROVIDER
        value: mock
      # Auth gate: ON by default (brand console requires sign-in; the doctor /hcp link is never gated).
      # Set to "0" ONLY to run the console open (pure demo). When ON, NEXUSREP_SESSION_SECRET is
      # REQUIRED — the brand API returns 503 until it's set (the built-in default is public/forgeable).
      - key: NEXUSREP_AUTH
        value: "1"
      # Rate limiting: OFF for now. The doctor endpoints are IP-keyed and HCPs share IPs (hospital NAT),
      # so enabling as-is could 429 a legitimate doctor. Flip to "1" once they're keyed by session.
      - key: NEXUSREP_RATELIMIT
        value: "0"
      # ---- secrets: set values in the Render dashboard (sync: false) ----
      # NEXUSREP_SESSION_SECRET signs the brand session cookie (HMAC-SHA256). REQUIRED when
      # NEXUSREP_AUTH=1: without a PRIVATE value the built-in default is public → anyone can forge an
      # "I'm admin" cookie with no password, so the brand API fails closed (503). generateValue makes
      # Render mint a strong random value on first deploy — it never lands in the repo or in chat, and
      # only generates once (stable across deploys). To rotate: delete it in the dashboard + redeploy.
      - key: NEXUSREP_SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL # managed Postgres (Neon) — SET. ALL canonical state + the usage/activity
        sync: false #        ledgers persist here and survive restarts. SSL auto-enabled for non-local
        #                    hosts. Point this at your PROD (main) branch; use a separate dev branch locally.
      - key: ANTHROPIC_API_KEY # grounded answer composition + classifier (optional)
        sync: false
      - key: OPENAI_API_KEY # alternate composer/classifier + off-video TTS (optional)
        sync: false
      # Real CRM handoff: set NEXUSREP_CRM_ADAPTER=veeva|salesforce (in the value block above) AND this
      # intake URL to POST follow-up events to a real CRM; a scheduled worker retries failures.
      - key: NEXUSREP_CRM_WEBHOOK_URL
        sync: false
      - key: NEXUSREP_CRM_WEBHOOK_TOKEN # optional bearer for the CRM intake endpoint
        sync: false
      - key: TAVUS_API_KEY # video rep (optional — mock avatar without it)
        sync: false
      - key: TAVUS_LLM_KEY # bearer Tavus uses to call back into /api/tavus/llm
        sync: false
      - key: HF_TOKEN # read-only Hugging Face token — REQUIRED for neural (NEXUSREP_EMBEDDINGS=auto) on
        sync: false #   Render (HF 403s anonymous datacenter downloads). Without it, retrieval falls to lexical.
      - key: NEXUSREP_PUBLIC_URL # https://<this-service>.onrender.com
        sync: false
      - key: DOCNEXUS_ADVANCED_SEARCH_URL # live HCP cohort (optional — modeled without it)
        sync: false
      - key: DOCNEXUS_ID_TOKEN # short-lived; prefer the refresh trio below
        sync: false
      # Browserless live-cohort auth (~30 days per login): run
      # `node scripts/docnexus-platform-token.mjs` locally once and copy
      # refreshToken/clientId/region from .docnexus-id-token.json.
      - key: DOCNEXUS_REFRESH_TOKEN
        sync: false
      - key: DOCNEXUS_COGNITO_CLIENT_ID
        sync: false
      - key: DOCNEXUS_COGNITO_REGION
        sync: false
